name: india-customs-inspection
version: '1.0.0'
description: >
  RL environment simulating CBIC customs officer decisions on import cargo.
  Agent detects anomalies, assigns inspection channels, and drafts legal
  Show Cause Notices across 60 synthetic Bills of Entry.

server:
  host: 0.0.0.0
  port: 7860
  endpoints:
    reset: {method: POST, path: /reset}
    step: {method: POST, path: /step}
    state: {method: GET, path: /state}
    health: {method: GET, path: /health}  # Fix #11: space after colon
    tasks: {method: GET, path: /tasks}
    explain_last: {method: GET, path: /explain-last}
    websocket: {method: WS, path: /ws}

observation_space:
  type: object
  description: Cargo manifest (Bill of Entry) with importer, goods, routing details
  properties:
    boe_number: {type: string}
    port_of_entry: {type: string}
    importer_name: {type: string}
    iec_code: {type: string}
    iec_age_months: {type: integer}
    country_of_origin: {type: string}
    country_of_export: {type: string}
    commodity: {type: string}
    hs_code: {type: string}
    declared_weight_kg: {type: number}
    declared_value_usd: {type: number}
    market_value_usd: {type: number, nullable: true}
    previous_violations: {type: integer}
    related_party: {type: boolean}
    related_party_disclosed: {type: boolean}
    routing_countries: {type: array, items: {type: string}}
    container_type: {type: string}

action_space:
  description: Task-specific action submitted via POST /step
  oneOf:
    - type: object
      required: [task, key_facts]
      additionalProperties: false
      properties:
        task:
          type: string
          enum: [extract_key_facts]
        key_facts:
          type: object
          additionalProperties: true
    - type: object
      required: [task, anomalies]
      additionalProperties: false
      properties:
        task:
          type: string
          enum: [detect_anomalies]
        anomalies:
          type: array
          items:
            type: string
            enum:
              - repeat_violator
              - high_risk_origin
              - weight_volume_mismatch
              - severe_undervaluation
              - new_iec_high_value
              - suspicious_routing
              - undisclosed_related_party
              - hs_code_risk
    - type: object
      required: [task, ranked_anomalies]
      additionalProperties: false
      properties:
        task:
          type: string
          enum: [rank_risk_severity]
        ranked_anomalies:
          type: array
          items:
            type: string
            enum:
              - repeat_violator
              - high_risk_origin
              - weight_volume_mismatch
              - severe_undervaluation
              - new_iec_high_value
              - suspicious_routing
              - undisclosed_related_party
              - hs_code_risk
    - type: object
      required: [task, channel]
      additionalProperties: false
      properties:
        task:
          type: string
          enum: [assign_channel]
        channel:
          type: string
          enum: [GREEN, ORANGE, RED]
    - type: object
      required: [task, legal_sections]
      additionalProperties: false
      properties:
        task:
          type: string
          enum: [cite_legal_basis]
        legal_sections:
          type: array
          items:
            type: string
    - type: object
      oneOf:
        - type: object
          required: [task, notice_text]
          additionalProperties: false
          properties:
            task:
              type: string
              enum: [draft_scn]
            notice_text:
              type: string
              minLength: 1
        - type: object
          required: [task, scn_text]
          additionalProperties: false
          properties:
            task:
              type: string
              enum: [draft_scn]
            scn_text:
              type: string
              minLength: 1
    - type: object
      required: [task, enforcement_recommendation]
      additionalProperties: false
      properties:
        task:
          type: string
          enum: [propose_enforcement]
        enforcement_recommendation:
          type: string
          minLength: 1

reward_range: [0.0, 1.0]

tasks:
  - name: manifest-anomaly-detection
    difficulty: easy
    steps: 1
    description: Detect all anomaly types present in the manifest. Severity-weighted recall scoring.

  - name: channel-assignment
    difficulty: medium
    steps: 2
    description: Detect anomalies then assign correct CBIC channel. Cross-consistency check applies.

  - name: show-cause-notice
    difficulty: hard
    steps: 7
    description: Seven-step pipeline from fact extraction to final enforcement recommendation.

data:
  seed: 42
  total_cases: 60
  distribution: {clean: 20, easy: 20, medium: 12, hard: 8}
  anomaly_types: 8

